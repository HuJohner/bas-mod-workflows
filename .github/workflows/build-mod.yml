name: Build Mod Addressables (Reusable)

on:
  workflow_call:
    secrets:
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_SERIAL:
        required: false  # Only needed for Pro licenses

env:
  BASSDK_PATH: BasSDK
  UNITY_VERSION: '2021.3.38f1'

jobs:
  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows
            method: CIBuildAddressables.BuildWindows
            build_target: StandaloneWindows64
            unity_modules: ''          # Base editor is enough for Windows addressables
            artifact: mod-windows
          - name: Android
            method: CIBuildAddressables.BuildAndroid
            build_target: Android
            unity_modules: 'android'   # Android Build Support module
            artifact: mod-android

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the shared workflow repo so we can access scripts/
      # -----------------------------------------------------------------------
      - name: Checkout workflow repo (for CI scripts)
        uses: actions/checkout@v4
        with:
          repository: HuJohner/bas-mod-workflows
          path: bas-mod-workflows

      # -----------------------------------------------------------------------
      # 2. Check out the calling mod repo
      # -----------------------------------------------------------------------
      - name: Checkout mod repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: mod

      # -----------------------------------------------------------------------
      # 3. Clone BasSDK from Azure DevOps
      # -----------------------------------------------------------------------
      - name: Clone BasSDK
        run: |
          git clone --depth 1 \
            https://dev.azure.com/Warpfrog/BasSDK/_git/BasSDK \
            ${{ env.BASSDK_PATH }}

      # -----------------------------------------------------------------------
      # 4. Link mod assets + inject CI script into BasSDK
      # -----------------------------------------------------------------------
      - name: Set up project structure
        run: |
          MOD_NAME="${{ github.event.repository.name }}"
          PERSONAL_DIR="${{ env.BASSDK_PATH }}/Assets/Personal"
          EDITOR_DIR="${{ env.BASSDK_PATH }}/Assets/Editor"

          mkdir -p "$PERSONAL_DIR"
          ln -s "$(pwd)/mod/Assets" "$PERSONAL_DIR/$MOD_NAME"
          echo "Linked mod assets -> $PERSONAL_DIR/$MOD_NAME"

          mkdir -p "$EDITOR_DIR"
          cp bas-mod-workflows/scripts/CIBuildAddressables.cs "$EDITOR_DIR/CIBuildAddressables.cs"
          echo "Injected CIBuildAddressables.cs into $EDITOR_DIR"

      # -----------------------------------------------------------------------
      # 5. Free up disk space (Unity + BasSDK needs several GB)
      # -----------------------------------------------------------------------
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # -----------------------------------------------------------------------
      # 6. Install Unity via Unity Hub (no Docker, no IL2CPP issues)
      # -----------------------------------------------------------------------
      - name: Install Unity ${{ env.UNITY_VERSION }}
        uses: kuler-space/unity-install@v0
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          unity-modules: ${{ matrix.target.unity_modules }}

      # -----------------------------------------------------------------------
      # 7. Cache Unity Library folder
      # -----------------------------------------------------------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.BASSDK_PATH }}/Library
          key: Library-${{ matrix.target.name }}-${{ hashFiles('mod/Assets/**') }}
          restore-keys: |
            Library-${{ matrix.target.name }}-
            Library-

      # -----------------------------------------------------------------------
      # 8. Activate Unity license (Personal)
      # -----------------------------------------------------------------------
      - name: Activate Unity license
        run: |
          UNITY_PATH=$(find /opt/unity/editors -name "Unity" -type f | head -1)
          echo "Unity path: $UNITY_PATH"
          "$UNITY_PATH" \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -activateLicense

      # -----------------------------------------------------------------------
      # 9. Build addressables
      # -----------------------------------------------------------------------
      - name: Build addressables (${{ matrix.target.name }})
        run: |
          UNITY_PATH=$(find /opt/unity/editors -name "Unity" -type f | head -1)
          "$UNITY_PATH" \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -projectPath "$(pwd)/${{ env.BASSDK_PATH }}" \
            -buildTarget ${{ matrix.target.build_target }} \
            -executeMethod ${{ matrix.target.method }}

      # -----------------------------------------------------------------------
      # 10. Return Unity license
      # -----------------------------------------------------------------------
      - name: Return Unity license
        if: always()
        run: |
          UNITY_PATH=$(find /opt/unity/editors -name "Unity" -type f | head -1)
          "$UNITY_PATH" \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -returnLicense || true  # Don't fail the job if return fails

      # -----------------------------------------------------------------------
      # 11. Upload build output as artifacts
      # -----------------------------------------------------------------------
      - name: Upload artifacts (${{ matrix.target.name }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: |
            ${{ env.BASSDK_PATH }}/BuildStaging/AddressableAssets/${{ matrix.target.name == 'Android' && 'Android' || 'Windows' }}/**
          if-no-files-found: warn
          retention-days: 30