name: Build Mod Addressables (Reusable)

on:
  workflow_call:
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true

env:
  BASSDK_PATH: BasSDK
  UNITY_VERSION: '2021.3.38f1'

jobs:
  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows
            method: CIBuildAddressables.BuildWindows
            build_target: StandaloneWindows64
            artifact: mod-windows
          - name: Android
            method: CIBuildAddressables.BuildAndroid
            build_target: Android
            artifact: mod-android

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the shared workflow repo so we can access scripts/
      # -----------------------------------------------------------------------
      - name: Checkout workflow repo (for CI scripts)
        uses: actions/checkout@v4
        with:
          repository: HuJohner/bas-mod-workflows
          path: bas-mod-workflows

      # -----------------------------------------------------------------------
      # 2. Check out the calling mod repo
      # -----------------------------------------------------------------------
      - name: Checkout mod repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: mod

      # -----------------------------------------------------------------------
      # 3. Clone BasSDK from Azure DevOps
      # -----------------------------------------------------------------------
      - name: Clone BasSDK
        run: |
          git clone --depth 1 \
            https://dev.azure.com/Warpfrog/BasSDK/_git/BasSDK \
            ${{ env.BASSDK_PATH }}

      # -----------------------------------------------------------------------
      # 4. Link mod assets + inject CI script into BasSDK
      # -----------------------------------------------------------------------
      - name: Set up project structure
        run: |
          MOD_NAME="${{ github.event.repository.name }}"
          PERSONAL_DIR="${{ env.BASSDK_PATH }}/Assets/Personal"
          EDITOR_DIR="${{ env.BASSDK_PATH }}/Assets/Editor"

          mkdir -p "$PERSONAL_DIR"
          ln -s "$(pwd)/mod/Assets" "$PERSONAL_DIR/$MOD_NAME"
          echo "Linked mod assets -> $PERSONAL_DIR/$MOD_NAME"

          mkdir -p "$EDITOR_DIR"
          cp bas-mod-workflows/scripts/CIBuildAddressables.cs "$EDITOR_DIR/CIBuildAddressables.cs"
          echo "Injected CIBuildAddressables.cs into $EDITOR_DIR"

      # -----------------------------------------------------------------------
      # 5. Cache Unity Library folder
      # -----------------------------------------------------------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: ${{ env.BASSDK_PATH }}/Library
          key: Library-${{ matrix.target.name }}-${{ hashFiles('mod/Assets/**') }}
          restore-keys: |
            Library-${{ matrix.target.name }}-
            Library-
            
      # -----------------------------------------------------------------------
      # Free up disk space (very important for Unity builds)
      # -----------------------------------------------------------------------
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # -----------------------------------------------------------------------
      # 6. Activate Unity license
      # -----------------------------------------------------------------------
      - name: Activate Unity
        uses: game-ci/unity-activate@v2
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}

      # -----------------------------------------------------------------------
      # 7. Run Unity editor script directly against the BasSDK project
      # -----------------------------------------------------------------------
      - name: Build addressables (${{ matrix.target.name }})
        run: |
          /opt/unity/Editor/Unity \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -projectPath "$(pwd)/${{ env.BASSDK_PATH }}" \
            -buildTarget ${{ matrix.target.build_target }} \
            -executeMethod ${{ matrix.target.method }}

      # -----------------------------------------------------------------------
      # 8. Return Unity license
      # -----------------------------------------------------------------------
      - name: Return Unity license
        uses: game-ci/unity-return-license@v2
        if: always()

      # -----------------------------------------------------------------------
      # DEBUG: Show exactly where the Addressables were built
      # -----------------------------------------------------------------------
      - name: Debug - Find Addressable Assets
        run: |
          echo "=== Current working directory ==="
          pwd
          
          echo "=== Looking for BuildStaging ==="
          find BasSDK -type d -name "BuildStaging" 2>/dev/null || echo "No BuildStaging folder"
          
          echo "=== Full AddressableAssets structure ==="
          find BasSDK/BuildStaging/AddressableAssets -type d 2>/dev/null || echo "AddressableAssets folder not found"
          
          echo "=== Looking for .bundle files ==="
          find BasSDK -name "*.bundle" | head -30
          
          echo "=== Looking for catalog files ==="
          find BasSDK -name "catalog*.json" | head -10
        shell: bash

      # -----------------------------------------------------------------------
      # 9. Upload build output as artifacts
      #    Update the path glob if BasSDK writes bundles elsewhere.
      # -----------------------------------------------------------------------
      - name: Upload artifacts (${{ matrix.target.name }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: |
            ${{ env.BASSDK_PATH }}/BuildStaging/AddressableAssets/${{ matrix.target.name == 'Android' && 'Android' || 'Windows' }}/**
          if-no-files-found: warn
          retention-days: 30